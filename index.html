<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsideTheCell</title>
  <style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }

  #background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    z-index: -1;
  }

  #playBtn {
    padding: 15px 40px;
    font-size: 60px;
    font-weight: bold;
    color: white;
    background-color: #ff8000;
    border: 5px solid white;
    border-radius: 50px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div id="app"></div>
  <img id="background" src="/assets/background.jpg"/>
  <button id="playBtn">Play</button>
  <script type="module" src="/src/title_page.ts"></script>
</body>
</html>
